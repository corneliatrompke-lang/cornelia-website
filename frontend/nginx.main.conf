# Main nginx configuration - minimal resources for Railway
worker_processes 1;
worker_rlimit_nofile 512;
pcre_jit off;

events {
    worker_connections 256;
    multi_accept off;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Disable access log to reduce I/O
    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    types_hash_max_size 2048;

    # Disable aio to prevent io_setup errors
    aio off;
    directio off;

    # Include server block configuration
    include /etc/nginx/conf.d/*.conf;
}
